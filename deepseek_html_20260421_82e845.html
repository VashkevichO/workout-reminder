<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Микро-упражнения для работы</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f4f8;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        button {
            background: #0066ff;
            border: none;
            color: white;
            font-size: 18px;
            padding: 12px 24px;
            border-radius: 40px;
            margin: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:active { transform: scale(0.97); }
        .interval-btn {
            background: #e0e7ff;
            color: #1e293b;
        }
        .interval-btn.active {
            background: #0066ff;
            color: white;
        }
        #exercise {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }
        #timer {
            font-size: 48px;
            font-family: monospace;
            font-weight: bold;
            margin: 20px 0;
            color: #0066ff;
        }
        #next-at {
            color: #475569;
            font-size: 14px;
        }
        .note {
            background: #fff9c4;
            border-radius: 20px;
            padding: 12px;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>🧘‍♀️ Разминка для работающих</h1>
<p>Короткие упражнения, чтобы не затекала спина и шея</p>

<div class="card">
    <h3>Интервал напоминаний</h3>
    <button class="interval-btn" data-minutes="30">30 мин</button>
    <button class="interval-btn active" data-minutes="60">1 час</button>
    <button class="interval-btn" data-minutes="120">2 часа</button>
</div>

<div class="card">
    <div id="exercise">👉 Нажми "Запустить"</div>
    <div id="timer">--:--</div>
    <button id="doneBtn">✅ Сделано! Сбросить таймер</button>
    <div id="next-at"></div>
</div>

<div class="note">
    💡 Разрешите уведомления, чтобы получать напоминания даже в фоне.
</div>

<script>
    // ---------- СПИСОК УПРАЖНЕНИЙ ----------
    const exercises = [
        { name: "Повернуть голову влево-вправо 5 раз", duration: 15 },
        { name: "Поднять плечи вверх-вниз 10 раз", duration: 15 },
        { name: "Свести лопатки, задержаться на 3 секунды — 5 раз", duration: 20 },
        { name: "Наклоны головы вперёд-назад (осторожно!)", duration: 15 },
        { name: "Круговые движения кистями 10 раз в каждую сторону", duration: 20 },
        { name: "Сжать и разжать пальцы рук с усилием 10 раз", duration: 12 },
        { name: "Встать со стула, потянуться вверх 5 секунд", duration: 15 },
        { name: "Подъём на носки стоя 10 раз", duration: 15 },
        { name: "Повороты корпуса сидя, руки на поясе", duration: 20 },
        { name: "Глубокий вдох-выдох 3 раза", duration: 12 },
        { name: "Закрыть глаза и вращать глазными яблоками", duration: 15 },
        { name: "Сцепить руки за спиной, раскрыть грудь", duration: 15 }
    ];

    let currentIntervalMinutes = 60;   // выбранный интервал
    let timerInterval = null;           // для обратного отсчёта на экране
    let nextTriggerTime = null;         // timestamp следующего уведомления

    // DOM элементы
    const exerciseDiv = document.getElementById('exercise');
    const timerDiv = document.getElementById('timer');
    const nextAtDiv = document.getElementById('next-at');
    const doneBtn = document.getElementById('doneBtn');

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function getRandomExercise() {
        const idx = Math.floor(Math.random() * exercises.length);
        return exercises[idx];
    }

    function showExerciseNow() {
        const ex = getRandomExercise();
        exerciseDiv.innerHTML = `🏋️ ${ex.name}<br><span style="font-size:14px; font-weight:normal;">Выполняйте ${ex.duration} секунд</span>`;
        startCountdown(ex.duration);
        // Отправляем уведомление (если разрешено)
        if (Notification.permission === "granted") {
            new Notification("🧘 Пора размяться!", { body: ex.name, icon: "https://cdn-icons-png.flaticon.com/512/2964/2964517.png" });
        }
    }

    function startCountdown(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        let remaining = seconds;
        timerDiv.innerText = `${remaining} сек`;
        timerInterval = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(timerInterval);
                timerDiv.innerText = `✅ Готово!`;
            } else {
                timerDiv.innerText = `${remaining} сек`;
            }
        }, 1000);
    }

    function scheduleNext(intervalMinutes) {
        if (nextTriggerTime) clearTimeout(nextTriggerTime);
        const delayMs = intervalMinutes * 60 * 1000;
        nextTriggerTime = setTimeout(() => {
            // Время пришло — показать упражнение
            showExerciseNow();
            // Запланировать следующее (если пользователь не нажал "Сделано" — всё равно сработает через интервал)
            scheduleNext(currentIntervalMinutes);
        }, delayMs);
        // Обновить отображение времени следующего напоминания
        const nextDate = new Date(Date.now() + delayMs);
        nextAtDiv.innerHTML = `⏰ Следующее напоминание: ${nextDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    }

    function resetScheduler() {
        if (nextTriggerTime) clearTimeout(nextTriggerTime);
        scheduleNext(currentIntervalMinutes);
        // Дополнительно: показать сообщение, что таймер сброшен
        exerciseDiv.innerHTML = `🕒 Таймер сброшен. Следующее упражнение через ${currentIntervalMinutes} мин.`;
        timerDiv.innerText = "--:--";
        if (timerInterval) clearInterval(timerInterval);
    }

    // ---------- НАСТРОЙКА ИНТЕРВАЛА ----------
    function setIntervalMinutes(minutes) {
        currentIntervalMinutes = minutes;
        resetScheduler();
        // Обновить активную кнопку
        document.querySelectorAll('.interval-btn').forEach(btn => {
            if (parseInt(btn.dataset.minutes) === minutes) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    function init() {
        // Запросить разрешение на уведомления
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
        // Установить активный интервал (по умолчанию 60)
        setIntervalMinutes(60);
        // Обработчики кнопок интервалов
        document.querySelectorAll('.interval-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mins = parseInt(btn.dataset.minutes);
                setIntervalMinutes(mins);
            });
        });
        // Кнопка "Сделано" — сбрасывает таймер (но не отменяет следующее)
        doneBtn.addEventListener('click', () => {
            resetScheduler();
        });
    }

    init();
</script>
</body>
</html>
