<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Микро-упражнения для работы</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            background: #f0f4f8;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin: 16px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        button {
            background: #0066ff;
            border: none;
            color: white;
            font-size: 18px;
            padding: 12px 24px;
            border-radius: 40px;
            margin: 8px;
            cursor: pointer;
            font-weight: 600;
            touch-action: manipulation;
            -webkit-appearance: none;
        }
        button:active {
            background: #0044cc;
        }
        .control-btn {
            background: #e0e7ff;
            color: #1e293b;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .time-settings {
            background: #f8fafc;
            border-radius: 24px;
            padding: 12px;
        }
        input, select {
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            margin: 5px;
        }
        .progress-container {
            background: #e2e8f0;
            border-radius: 30px;
            height: 20px;
            width: 100%;
            margin: 10px 0;
        }
        .progress-fill {
            background: #10b981;
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.3s;
        }
        #debug {
            background: #f1f5f9;
            font-size: 12px;
            padding: 8px;
            border-radius: 16px;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<h1>🧘‍♀️ Разминка для работающих</h1>

<div class="card">
    <h3>⏰ Активное время</h3>
    <div class="time-settings">
        <label>С: <input type="time" id="startTime" value="09:00"></label>
        <label>До: <input type="time" id="endTime" value="18:00"></label>
        <label>Интервал: 
            <select id="intervalSelect">
                <option value="30">30 мин</option>
                <option value="60" selected>1 час</option>
                <option value="120">2 часа</option>
            </select>
        </label>
        <button id="saveSettingsBtn" class="control-btn">💾 Сохранить</button>
    </div>
</div>

<div class="card">
    <div id="exercise">👉 Нажмите «Старт»</div>
    <div id="timer">--:--</div>
    <div class="flex-row">
        <button id="startBtn">▶ Старт</button>
        <button id="stopBtn">⏹ Стоп</button>
        <button id="skipBtn" class="control-btn">⏩ Следующее</button>
        <button id="doneBtn" class="control-btn">✅ Сделано</button>
    </div>
    <div id="next-at"></div>
</div>

<div class="card">
    <div>🏆 Сегодня: <span id="todayCount">0</span> / <span id="dailyGoal">8</span></div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div id="motivationText"></div>
    <button id="resetStatsBtn" class="control-btn">Сбросить счёт</button>
</div>

<div id="debug">🔍 Отладка: готово</div>

<script>
    (function() {
        // ---------- ПРОСТЫЕ УПРАЖНЕНИЯ ----------
        const exerciseList = [
            "Повернуть голову влево-вправо 5 раз",
            "Поднять плечи вверх-вниз 10 раз",
            "Свести лопатки 5 раз",
            "Наклоны головы вперёд-назад",
            "Круговые движения кистями",
            "Встать, потянуться вверх 5 сек",
            "Подъём на носки 10 раз",
            "Глубокий вдох-выдох 3 раза"
        ];
        function getRandomExerciseText() {
            return exerciseList[Math.floor(Math.random() * exerciseList.length)];
        }

        // ---------- DOM ----------
        const exerciseDiv = document.getElementById('exercise');
        const timerDiv = document.getElementById('timer');
        const nextAtDiv = document.getElementById('next-at');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const skipBtn = document.getElementById('skipBtn');
        const doneBtn = document.getElementById('doneBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const resetStatsBtn = document.getElementById('resetStatsBtn');
        const todayCountSpan = document.getElementById('todayCount');
        const progressFill = document.getElementById('progressFill');
        const motivationText = document.getElementById('motivationText');
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');
        const intervalSelect = document.getElementById('intervalSelect');
        const debugDiv = document.getElementById('debug');

        function log(msg) {
            debugDiv.innerHTML = `🔍 ${msg}<br>${debugDiv.innerHTML.slice(0, 200)}`;
            console.log(msg);
        }

        // ---------- ПЕРЕМЕННЫЕ ----------
        let isRunning = false;
        let currentIntervalMinutes = 60;
        let activeStart = "09:00";
        let activeEnd = "18:00";
        let todayCompleted = 0;
        let dailyGoal = 8;
        let timerInterval = null;
        let nextTriggerTime = null;

        // ---------- СТАТИСТИКА ----------
        function loadStats() {
            try {
                const today = new Date().toDateString();
                const saved = localStorage.getItem('workout_stats');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.date === today) todayCompleted = data.count;
                    else todayCompleted = 0;
                } else todayCompleted = 0;
                updateStatsDisplay();
                log(`Загружено статистика: ${todayCompleted}`);
            } catch(e) { log(`Ошибка загрузки статистики: ${e}`); }
        }
        function saveStats() {
            try {
                const today = new Date().toDateString();
                localStorage.setItem('workout_stats', JSON.stringify({ date: today, count: todayCompleted }));
                log(`Сохранено статистика: ${todayCompleted}`);
            } catch(e) { log(`Ошибка сохранения статистики: ${e}`); }
        }
        function updateStatsDisplay() {
            todayCountSpan.innerText = todayCompleted;
            const percent = Math.min(100, (todayCompleted / dailyGoal) * 100);
            progressFill.style.width = percent + "%";
            if (todayCompleted >= dailyGoal) motivationText.innerText = "🏆 Ты чемпион!";
            else motivationText.innerText = `Осталось ${dailyGoal - todayCompleted} до цели`;
        }
        function incrementStats() {
            todayCompleted++;
            saveStats();
            updateStatsDisplay();
            log(`Упражнение засчитано, всего: ${todayCompleted}`);
        }
        function resetStats() {
            if (confirm("Сбросить счёт?")) {
                todayCompleted = 0;
                saveStats();
                updateStatsDisplay();
                log("Счёт сброшен");
            }
        }

        // ---------- НАСТРОЙКИ ----------
        function loadSettings() {
            try {
                const settings = localStorage.getItem('workout_settings');
                if (settings) {
                    const s = JSON.parse(settings);
                    activeStart = s.start || "09:00";
                    activeEnd = s.end || "18:00";
                    currentIntervalMinutes = s.interval || 60;
                    startTimeInput.value = activeStart;
                    endTimeInput.value = activeEnd;
                    intervalSelect.value = currentIntervalMinutes;
                    log(`Настройки загружены: ${activeStart}-${activeEnd}, интервал ${currentIntervalMinutes} мин`);
                } else {
                    log("Настроек нет, используем по умолчанию");
                }
            } catch(e) { log(`Ошибка загрузки настроек: ${e}`); }
        }
        function saveSettings() {
            try {
                activeStart = startTimeInput.value;
                activeEnd = endTimeInput.value;
                currentIntervalMinutes = parseInt(intervalSelect.value);
                localStorage.setItem('workout_settings', JSON.stringify({
                    start: activeStart, end: activeEnd, interval: currentIntervalMinutes
                }));
                log(`Настройки сохранены: ${activeStart}-${activeEnd}, интервал ${currentIntervalMinutes}`);
                alert("Настройки сохранены!");
                if (isRunning) {
                    // перезапуск напоминаний
                    stopReminders();
                    startReminders();
                }
            } catch(e) { log(`Ошибка сохранения настроек: ${e}`); }
        }

        // ---------- ЛОГИКА НАПОМИНАНИЙ ----------
        function isWithinActiveTime() {
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            const [startH, startM] = activeStart.split(":").map(Number);
            const [endH, endM] = activeEnd.split(":").map(Number);
            const startTotal = startH * 60 + startM;
            let endTotal = endH * 60 + endM;
            if (endTotal <= startTotal) endTotal += 24 * 60;
            return current >= startTotal && current < endTotal;
        }

        function showExerciseNow() {
            if (!isRunning) return;
            if (!isWithinActiveTime()) {
                exerciseDiv.innerHTML = "⏸ Неактивное время, следующая проверка через минуту";
                scheduleNext(1);
                return;
            }
            const exText = getRandomExerciseText();
            exerciseDiv.innerHTML = `🏋️ ${exText}<br><span style="font-size:14px;">Выполняйте 15 секунд</span>`;
            startCountdown(15);
            if (Notification.permission === "granted") {
                new Notification("Пора размяться!", { body: exText });
            }
            log("Показано упражнение: " + exText);
        }

        function startCountdown(seconds) {
            if (timerInterval) clearInterval(timerInterval);
            let remaining = seconds;
            timerDiv.innerText = `${remaining} сек`;
            timerInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    timerDiv.innerText = "✅ Готово!";
                    incrementStats();
                } else {
                    timerDiv.innerText = `${remaining} сек`;
                }
            }, 1000);
        }

        function scheduleNext(delayMinutes = null) {
            if (nextTriggerTime) clearTimeout(nextTriggerTime);
            const interval = (delayMinutes !== null) ? delayMinutes : currentIntervalMinutes;
            const delayMs = interval * 60 * 1000;
            nextTriggerTime = setTimeout(() => {
                if (isRunning) {
                    showExerciseNow();
                    scheduleNext();
                }
            }, delayMs);
            if (isRunning) {
                const nextDate = new Date(Date.now() + delayMs);
                nextAtDiv.innerHTML = `⏰ Следующее: ${nextDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            } else {
                nextAtDiv.innerHTML = "⏸ Остановлено";
            }
        }

        function startReminders() {
            log("startReminders вызвана");
            if (isRunning) return;
            isRunning = true;
            if (isWithinActiveTime()) {
                showExerciseNow();
                scheduleNext();
            } else {
                exerciseDiv.innerHTML = `🕒 Неактивное время (${activeStart}–${activeEnd}). Ждём...`;
                scheduleNext(1);
            }
            log("Напоминания запущены");
        }

        function stopReminders() {
            log("stopReminders вызвана");
            isRunning = false;
            if (nextTriggerTime) clearTimeout(nextTriggerTime);
            if (timerInterval) clearInterval(timerInterval);
            nextTriggerTime = null;
            timerInterval = null;
            timerDiv.innerText = "--:--";
            nextAtDiv.innerHTML = "⏸ Остановлено";
            exerciseDiv.innerHTML = "👉 Нажмите «Старт»";
        }

        function skipExercise() {
            log("skipExercise вызвана");
            if (!isRunning) { log("Не запущено, пропуск не работает"); return; }
            if (timerInterval) clearInterval(timerInterval);
            const exText = getRandomExerciseText();
            exerciseDiv.innerHTML = `🏋️ ${exText}<br><span style="font-size:14px;">Выполняйте 15 секунд</span>`;
            startCountdown(15);
        }

        function doneAndReset() {
            log("doneAndReset вызвана");
            if (!isRunning) { log("Не запущено, кнопка Сделано не активна"); return; }
            incrementStats();
            if (timerInterval) clearInterval(timerInterval);
            timerDiv.innerText = "--:--";
            exerciseDiv.innerHTML = `✅ Молодец! Следующее через ${currentIntervalMinutes} мин.`;
            if (nextTriggerTime) clearTimeout(nextTriggerTime);
            scheduleNext();
        }

        // ---------- ПРИВЯЗКА КНОПОК (click + touchstart) ----------
        function addHandler(btn, handler) {
            if (!btn) return;
            btn.addEventListener('click', (e) => { e.preventDefault(); handler(); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handler(); });
            log(`Обработчик добавлен для ${btn.id || btn.innerText}`);
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            log("Инициализация...");
            loadStats();
            loadSettings();
            if (Notification.permission === "default") Notification.requestPermission();
            addHandler(startBtn, startReminders);
            addHandler(stopBtn, stopReminders);
            addHandler(skipBtn, skipExercise);
            addHandler(doneBtn, doneAndReset);
            addHandler(saveSettingsBtn, saveSettings);
            addHandler(resetStatsBtn, resetStats);
            log("Готово. Кнопки должны работать.");
        }
        init();
    })();
</script>
</body>
</html>
